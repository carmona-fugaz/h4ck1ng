stages:
  - build
  - security
  - quality

# Job del SonarCloud.
sonarcloud_scan:
  stage: quality
  image: ubuntu:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    # Instalar el cliente Docker en Ubuntu para poder lanzar la imagen de SonarCloud
    - apt-get update -qq && apt-get install -y -qq docker.io

    - docker run --rm
      -e SONAR_TOKEN=$SONAR_TOKEN
      -e SONAR_HOST_URL=$SONAR_HOST_URL
      -v "$CI_PROJECT_DIR:/usr/src"
      sonarsource/sonar-scanner-cli:latest
  artifacts:
    paths:
      - Artifact_Desarrollo_Seguro.json

# Job del Dependency Check.
dependency_check:
  stage: security
  image: ubuntu:latest        # Ubuntu como base → apt y jq disponibles
  services:
    - docker:dind             # Docker-in-Docker para poder usar la imagen de OWASP
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  # ──────────────────────────────────────────────────────────────────────────
  # Para omitir el bloqueo y probar la pipeline completa, descomenta:
  # allow_failure: true
  # ──────────────────────────────────────────────────────────────────────────
  script:
    # Instalar docker.io y jq desde apt (Ubuntu, sin problemas de compatibilidad)
    - apt-get update -qq && apt-get install -y -qq docker.io jq

    # Lanzar la imagen OWASP Dependency-Check dentro del contenedor Ubuntu,
    # montando el directorio del proyecto para que lo analice
    - docker run --rm
      -v "$CI_PROJECT_DIR:/src"
      owasp/dependency-check
      --project "H4ck1ng"
      --scan /src
      --format JSON
      --out /src

    - mv "$CI_PROJECT_DIR/dependency-check-report.json" Artifact_Desarrollo_Seguro.json

    # Contar vulnerabilidades CRITICAL, HIGH o MEDIUM y bloquear si las hay
    - |
      VULN_COUNT=$(jq '[
        .dependencies[]?.vulnerabilities[]?
        | select(.severity == "CRITICAL" or .severity == "HIGH" or .severity == "MEDIUM")
      ] | length' Artifact_Desarrollo_Seguro.json)

      echo "Vulnerabilidades CRITICAL/HIGH/MEDIUM encontradas: $VULN_COUNT"

      if [ "$VULN_COUNT" -gt 0 ]; then
        echo ""
        echo "🚨 ¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        echo "   Se han detectado $VULN_COUNT vulnerabilidad/es con severidad CRITICAL, HIGH o MEDIUM."
        echo "   Revisa el artefacto 'Artifact_Desarrollo_Seguro.json' para ver el detalle."
        echo ""
        echo "ℹ️  Para omitir este bloqueo y probar la pipeline completa, añade"
        echo "   'allow_failure: true' en el job 'dependency_check' del fichero .gitlab-ci.yml."
        exit 1
      else
        echo "✅ No se han detectado vulnerabilidades críticas, altas o medias. Pipeline desbloqueada."
      fi

  artifacts:
    paths:
      - Artifact_Desarrollo_Seguro.json