include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml
  - template: Security/DAST.gitlab-ci.yml

stages:
  - build
  - dast_scan
  - secrets
  - test
  - sca
  - sast
  - snyk
  - security
  - quality


# Job del SonarCloud.
sonarcloud_scan:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest
#  Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true
  script:
    - |
      sonar-scanner \
        -Dsonar.token=$SONAR_TOKEN \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.qualitygate.wait=true
      SCAN_EXIT=$?

      if [ $SCAN_EXIT -ne 0 ]; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        echo '{"tool":"SonarCloud","status":"vulnerabilities_found"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
        echo '{"tool":"SonarCloud","status":"analysis_completed"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      fi

  artifacts:
    when: always
    paths:
      - $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json

# Job del Dependency Check
dependency_check:
  stage: security

  image:
    name: owasp/dependency-check
    entrypoint: [""]
#  Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true
  script:
    - mkdir -p $CI_PROJECT_DIR/reports

    - /usr/share/dependency-check/bin/dependency-check.sh \
      --project "H4ck1ng" \
      --scan $CI_PROJECT_DIR \
      --format JSON \
      --prettyPrint \
      --out $CI_PROJECT_DIR/reports

    - |
      if [ -f "$CI_PROJECT_DIR/reports/dependency-check-report.json" ]; then
        mv $CI_PROJECT_DIR/reports/dependency-check-report.json $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      else
        echo '{"tool":"DependencyCheck","status":"report_generated_but_empty"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      fi

    - |
      if grep -qiE '"severity"\s*:\s*"(CRITICAL|HIGH|MEDIUM)"' "$CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json"; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
      fi

  artifacts:
    when: always
    paths:
      - Artifact_Desarrollo_Seguro.json

secret_detection:

  stage: secrets

  artifacts:
    name: "Artifact_Desarrollo_Seguro"
    paths:
      - gl-secret-detection-report.json
    reports:
      secret_detection: Artifact_Desarrollo_Seguro.json

 # Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades.
  allow_failure: true

sca_vulnerability_check:
  stage: sca
  image: alpine:latest
  dependencies:
    - dependency_scanning
  script:
    - |
      if [ -f gl-dependency-scanning-report.json ]; then
        cp gl-dependency-scanning-report.json Artifact_Desarrollo_Seguro.json
      else
        echo '{"tool":"DependencyScanning","status":"no_report"}' > Artifact_Desarrollo_Seguro.json
      fi

    - |
      if grep -qiE '"severity"\s*:\s*"(critical|high|medium)"' Artifact_Desarrollo_Seguro.json; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
      fi
#  Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades.
  allow_failure: true

sast:
  stage: sast

  after_script:
    - echo "Procesando resultados del análisis SAST..."

    - |
      if [ -f gl-sast-report.json ]; then
        cp gl-sast-report.json Artifact_Desarrollo_Seguro.json
      else
        echo "{}" > Artifact_Desarrollo_Seguro.json
      fi

    - |
      if grep -qiE '"severity"\s*:\s*"(critical|high|medium)"' Artifact_Desarrollo_Seguro.json; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
      fi

  artifacts:
    when: always
    paths:
      - Artifact_Desarrollo_Seguro.json

  # Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true

snyk_sast:
  stage: snyk
  image: node:18
  variables:
    SNYK_TOKEN: $SNYK_TOKEN  # GitLab CI variable protegida
  before_script:
    - npm install -g snyk
    - npm install
  script:
      if snyk test --severity-threshold=medium --json > snyk-report.json; then
        snyk_exit_code=0
      else
        snyk_exit_code=1
      fi
      - |
      if [ $snyk_exit_code -eq 0 ]; then
        echo "✅ No se encontraron vulnerabilidades críticas, altas o medias."
      elif [ $snyk_exit_code -eq 1 ]; then
        echo "❌ ¡Se han encontrado vulnerabilidades críticas, altas o medias! Pipeline detenida."
        exit 1
      else
        echo "⚠️ Error en la ejecución de Snyk (código $snyk_exit_code). Posible problema de autenticación, red o configuración."
        exit $snyk_exit_code
      fi
  artifacts:
    paths:
      - Artifact_Desarrollo_Seguro.json
    when: always                
  # Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true

# Artifact y bloqueo en un job independiente que depende del DAST oficial
dast:
  stage: dast_scan
  variables:
    DAST_TARGET_URL: "$NGROK_URL/dvwa/"
    DAST_AUTH_URL: "$NGROK_URL/dvwa/login.php"
    DAST_USERNAME_FIELD: "css:input[name='username']"
    DAST_PASSWORD_FIELD: "css:input[name='password']"
    DAST_SUBMIT_FIELD: "css:input[type='submit']"
    DAST_BROWSER_SCAN: "true"
    DAST_FULL_SCAN_ENABLED: "true"
    DAST_REQUEST_HEADERS: "ngrok-skip-browser-warning: true"
    # Aumentar profundidad de rastreo (por si acaso)
    DAST_CRAWL_DEPTH: 10
    # --- NUEVO: Especificar rutas a escanear ---
    DAST_PATHS: >-
      /dvwa/vulnerabilities/sqli/
      /dvwa/vulnerabilities/sqli/?id=1&Submit=Submit
      /dvwa/vulnerabilities/xss_r/
      /dvwa/vulnerabilities/xss_r/?name=test
      /dvwa/vulnerabilities/xss_s/
      /dvwa/vulnerabilities/exec/
      /dvwa/vulnerabilities/csrf/
      /dvwa/vulnerabilities/fi/
      /dvwa/vulnerabilities/upload/
      /dvwa/vulnerabilities/captcha/
      /dvwa/vulnerabilities/weak_id/
    OMIT_SECURITY_GATE: "false"
  before_script:
    - apk add --no-cache curl grep sed
    - |
      set -x  # Modo depuración (opcional, puedes quitarlo)

      LOGIN_URL="$NGROK_URL/dvwa/login.php"
      SECURITY_URL="$NGROK_URL/dvwa/security.php"
      INDEX_URL="$NGROK_URL/dvwa/index.php"
      USERNAME="admin"
      PASSWORD="password"
      
      COOKIE_FILE=$(mktemp)
      
      # 1. Login
      echo "🔐 Haciendo login..."
      curl -s -L -c "$COOKIE_FILE" -b "$COOKIE_FILE" -X POST \
        -d "username=$USERNAME&password=$PASSWORD&Login=Login" \
        "$LOGIN_URL" > /dev/null || { echo "❌ Login falló"; exit 1; }
      
      # 2. Obtener token CSRF de security.php
      echo "🔑 Obteniendo token CSRF..."
      SECURITY_PAGE=$(curl -s -L -b "$COOKIE_FILE" -c "$COOKIE_FILE" "$SECURITY_URL")
      TOKEN=$(echo "$SECURITY_PAGE" | grep -oP 'name="user_token" value="\K[^"]+' | head -1)
      
      if [ -z "$TOKEN" ]; then
        echo "❌ No se pudo obtener el token CSRF. Abortando."
        exit 1
      fi
      
      # 3. Cambiar nivel a "low"
      echo "⬇️ Cambiando nivel de seguridad a low..."
      curl -s -L -b "$COOKIE_FILE" -c "$COOKIE_FILE" -X POST \
        -d "security=low&user_token=$TOKEN&Change=Change" \
        "$SECURITY_URL" > /dev/null || { echo "❌ Falló el POST para cambiar nivel"; exit 1; }
      
      # 4. Visitar página principal para actualizar cookies
      curl -s -L -b "$COOKIE_FILE" -c "$COOKIE_FILE" "$INDEX_URL" > /dev/null
      
      # 5. Extraer cookies
      PHPSESSID=$(grep -E '\sPHPSESSID\s' "$COOKIE_FILE" | tail -1 | awk '{print $7}')
      SECURITY=$(grep -E '\ssecurity\s' "$COOKIE_FILE" | tail -1 | awk '{print $7}')
      
      echo "🍪 Cookies: PHPSESSID=$PHPSESSID, security=$SECURITY"
      
      # 6. Verificar nivel "low"
      CHECK_PAGE=$(curl -s -L -b "$COOKIE_FILE" "$SECURITY_URL")
      if echo "$CHECK_PAGE" | grep -q '<option value="low" selected>'; then
        echo "✅ Nivel de seguridad confirmado: low"
      else
        echo "❌ El nivel NO es low. Abortando."
        echo "$CHECK_PAGE" | head -20
        exit 1
      fi
      
      # 7. Pasar cookies al escáner y deshabilitar autenticación automática
      if [ -n "$PHPSESSID" ] && [ -n "$SECURITY" ]; then
        export DAST_COOKIES="PHPSESSID=$PHPSESSID; security=$SECURITY"
        export DAST_AUTH_DISABLED="true"
        echo "🍪 Cookies configuradas para el escáner."
      else
        echo "❌ No se encontraron las cookies necesarias."
        exit 1
      fi
      
      rm -f "$COOKIE_FILE"
      
    - echo "🚀 Iniciando DAST autenticado en $DAST_TARGET_URL con rutas específicas"
  after_script:
    - |
      if [ -f "$CI_PROJECT_DIR/gl-dast-report.json" ]; then
        cp "$CI_PROJECT_DIR/gl-dast-report.json" Artifact_Desarrollo_Seguro.json
      else
        echo "gl-dast-report.json no existe. Falló el escaneo DAST"
        exit 1
      fi

      if [ "$OMIT_SECURITY_GATE" != "true" ]; then
        apk add --no-cache jq
        if jq -e '.vulnerabilities[] | select(.severity=="Critical" or .severity=="High" or .severity=="Medium")' "$CI_PROJECT_DIR/gl-dast-report.json" > /dev/null; then
          echo "❌ ¡Se han encontrado vulnerabilidades críticas, altas o medias! Pipeline detenido."
          exit 1
        else
          echo "✅ No se encontraron vulnerabilidades críticas, altas o medias"
        fi
      fi
  artifacts:
    name: "Artifact_Desarrollo_Seguro"
    paths:
      - Artifact_Desarrollo_Seguro.json
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_REF_NAME == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"