include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml
  - template: Security/DAST.gitlab-ci.yml

stages:
  - build
  - secrets
  - test
  - sca
  - sast
  - snyk
  - security
  - quality
  - dast


# Job del SonarCloud.
sonarcloud_scan:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest
#  Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true
  script:
    - |
      sonar-scanner \
        -Dsonar.token=$SONAR_TOKEN \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.qualitygate.wait=true
      SCAN_EXIT=$?

      if [ $SCAN_EXIT -ne 0 ]; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        echo '{"tool":"SonarCloud","status":"vulnerabilities_found"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
        echo '{"tool":"SonarCloud","status":"analysis_completed"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      fi

  artifacts:
    when: always
    paths:
      - $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json

# Job del Dependency Check
dependency_check:
  stage: security

  image:
    name: owasp/dependency-check
    entrypoint: [""]
#  Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true
  script:
    - mkdir -p $CI_PROJECT_DIR/reports

    - /usr/share/dependency-check/bin/dependency-check.sh \
      --project "H4ck1ng" \
      --scan $CI_PROJECT_DIR \
      --format JSON \
      --prettyPrint \
      --out $CI_PROJECT_DIR/reports

    - |
      if [ -f "$CI_PROJECT_DIR/reports/dependency-check-report.json" ]; then
        mv $CI_PROJECT_DIR/reports/dependency-check-report.json $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      else
        echo '{"tool":"DependencyCheck","status":"report_generated_but_empty"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      fi

    - |
      if grep -qiE '"severity"\s*:\s*"(CRITICAL|HIGH|MEDIUM)"' "$CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json"; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
      fi

  artifacts:
    when: always
    paths:
      - Artifact_Desarrollo_Seguro.json

secret_detection:

  stage: secrets

  artifacts:
    name: "Artifact_Desarrollo_Seguro"
    paths:
      - gl-secret-detection-report.json
    reports:
      secret_detection: Artifact_Desarrollo_Seguro.json

 # Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades.
  allow_failure: true

sca_vulnerability_check:
  stage: sca
  image: alpine:latest
  dependencies:
    - dependency_scanning
  script:
    - |
      if [ -f gl-dependency-scanning-report.json ]; then
        cp gl-dependency-scanning-report.json Artifact_Desarrollo_Seguro.json
      else
        echo '{"tool":"DependencyScanning","status":"no_report"}' > Artifact_Desarrollo_Seguro.json
      fi

    - |
      if grep -qiE '"severity"\s*:\s*"(critical|high|medium)"' Artifact_Desarrollo_Seguro.json; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
      fi
#  Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades.
  allow_failure: true

sast:
  stage: sast

  after_script:
    - echo "Procesando resultados del análisis SAST..."

    - |
      if [ -f gl-sast-report.json ]; then
        cp gl-sast-report.json Artifact_Desarrollo_Seguro.json
      else
        echo "{}" > Artifact_Desarrollo_Seguro.json
      fi

    - |
      if grep -qiE '"severity"\s*:\s*"(critical|high|medium)"' Artifact_Desarrollo_Seguro.json; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
      fi

  artifacts:
    when: always
    paths:
      - Artifact_Desarrollo_Seguro.json

  # Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true

snyk_sast:
  stage: snyk
  image: node:18
  variables:
    SNYK_TOKEN: $SNYK_TOKEN  # GitLab CI variable protegida
  before_script:
    - npm install -g snyk
    - npm install
  script:
      if snyk test --severity-threshold=medium --json > snyk-report.json; then
        snyk_exit_code=0
      else
        snyk_exit_code=1
      fi
      - |
      if [ $snyk_exit_code -eq 0 ]; then
        echo "✅ No se encontraron vulnerabilidades críticas, altas o medias."
      elif [ $snyk_exit_code -eq 1 ]; then
        echo "❌ ¡Se han encontrado vulnerabilidades críticas, altas o medias! Pipeline detenida."
        exit 1
      else
        echo "⚠️ Error en la ejecución de Snyk (código $snyk_exit_code). Posible problema de autenticación, red o configuración."
        exit $snyk_exit_code
      fi
  artifacts:
    paths:
      - Artifact_Desarrollo_Seguro.json
    when: always                
  # Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true

variables:
  DAST_TARGET_URL: "$NGROK_URL/dvwa/"
  DAST_AUTH_URL: "$NGROK_URL/dvwa/login.php"

  DAST_USERNAME_FIELD: "css:input[name='username']"
  DAST_PASSWORD_FIELD: "css:input[name='password']"
  DAST_SUBMIT_FIELD: "css:input[type='submit']"

  DAST_BROWSER_SCAN: "true"
  DAST_FULL_SCAN_ENABLED: "true"
  DAST_REQUEST_HEADERS: "ngrok-skip-browser-warning: true"

  OMIT_SECURITY_GATE: "false"


artifact_export:
  stage: dast
  image: alpine
  needs:
    - job: dast
      optional: true
  script:
    - echo "Creando artifact para el desarrollador"
    - cp gl-dast-report.json Artifact_Desarrollo_Seguro.json
  artifacts:
    name: "Artifact_Desarrollo_Seguro"
    paths:
      - Artifact_Desarrollo_Seguro.json
    expire_in: 1 week


security_gate:
  stage: dast
  image: alpine
  needs:
    - job: dast
      optional: true
  script:
    - apk add --no-cache jq
    - |
      if [ "$OMIT_SECURITY_GATE" = "true" ]; then
        echo "Se ha omitido el control de seguridad"
        exit 0
      fi

      if jq '.vulnerabilities[] | select(.severity=="Critical" or .severity=="High" or .severity=="Medium")' gl-dast-report.json; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "No se encontraron vulnerabilidades críticas, altas o medias"
      fi