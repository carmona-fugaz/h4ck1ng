stages:
 - build
 - security
 - quality

# Job del SonarCloud.
sonarcloud_scan:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest

  script:
    # Ejecutar el análisis de SonarCloud
    - apt-get update && apt-get install -y jq
    - sonar-scanner -Dsonar.login=$SONAR_TOKEN -Dsonar.host.url=$SONAR_HOST_URL

    # Generar artifact básico con estado inicial
    - echo '{"tool":"SonarCloud","status":"analysis_completed"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json

    # Analizar el reporte de SonarCloud (simulación JSON)
    # En un escenario real, SonarCloud devuelve un reporte mediante API.
    # Aquí asumimos que tienes un JSON con vulnerabilidades para bloquear pipeline.
    - |
      # Ejemplo: simular extracción de vulnerabilidades
      # Para la práctica podemos crear un array vacío si no hay vulnerabilidades
      echo '{"vulnerabilities":[]}' > $CI_PROJECT_DIR/sonar_report.json

      # Contar vulnerabilidades críticas, altas o medias
      CRITICAL_HIGH_MED=$(jq '[.vulnerabilities[]? | select(.severity=="Critical" or .severity=="High" or .severity=="Medium")] | length' $CI_PROJECT_DIR/sonar_report.json)

      if [ "$CRITICAL_HIGH_MED" -gt 0 ]; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias en SonarCloud!"
        exit 1
      else
        echo "No se han detectado vulnerabilidades críticas, altas o medias en SonarCloud."
      fi

  artifacts:
    when: always
    paths:
      - $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json

# Job del Dependency Check.
dependency_check:
  stage: security

  image:
    name: owasp/dependency-check
    entrypoint: [""]

  script:
    - mkdir -p $CI_PROJECT_DIR/reports

    # Ejecutar Dependency Check
    - /usr/share/dependency-check/bin/dependency-check.sh \
      --project "DevSecOpsLab" \
      --scan $CI_PROJECT_DIR \
      --format JSON \
      --prettyPrint \
      --out $CI_PROJECT_DIR/reports

    # Mover el reporte al artifact
    - |
      if [ -f "$CI_PROJECT_DIR/reports/dependency-check-report.json" ]; then
        mv $CI_PROJECT_DIR/reports/dependency-check-report.json $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      else
        echo '{"tool":"DependencyCheck","status":"report_generated_but_empty"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      fi

    # Bloqueo pipeline basado en vulnerabilidades críticas, altas o medias
    - |
      python3 - << EOF
import json, sys
with open("$CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json") as f:
    data = json.load(f)
vulns = sum(
    1 for d in data.get("dependencies", [])
    for v in d.get("vulnerabilities", [])
    if v.get("severity") in ["Critical","High","Medium"]
)
if vulns > 0:
    print("¡Se han encontrado vulnerabilidades críticas, altas o medias!")
    sys.exit(1)
else:
    print("No se han detectado vulnerabilidades críticas, altas o medias.")
EOF

  artifacts:
    when: always
    paths:
      - $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json