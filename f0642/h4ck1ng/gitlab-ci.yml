include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml

stages:
  - build
  - secrets
  - test
  - sca
  - sast
  - snyk
  - security
  - quality


# Job del SonarCloud.
sonarcloud_scan:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest
#  Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true
  script:
    - |
      sonar-scanner \
        -Dsonar.token=$SONAR_TOKEN \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.qualitygate.wait=true
      SCAN_EXIT=$?

      if [ $SCAN_EXIT -ne 0 ]; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        echo '{"tool":"SonarCloud","status":"vulnerabilities_found"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
        echo '{"tool":"SonarCloud","status":"analysis_completed"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      fi

  artifacts:
    when: always
    paths:
      - $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json

# Job del Dependency Check
dependency_check:
  stage: security

  image:
    name: owasp/dependency-check
    entrypoint: [""]
#  Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  allow_failure: true
  script:
    - mkdir -p $CI_PROJECT_DIR/reports

    - /usr/share/dependency-check/bin/dependency-check.sh \
      --project "H4ck1ng" \
      --scan $CI_PROJECT_DIR \
      --format JSON \
      --prettyPrint \
      --out $CI_PROJECT_DIR/reports

    - |
      if [ -f "$CI_PROJECT_DIR/reports/dependency-check-report.json" ]; then
        mv $CI_PROJECT_DIR/reports/dependency-check-report.json $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      else
        echo '{"tool":"DependencyCheck","status":"report_generated_but_empty"}' > $CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json
      fi

    - |
      if grep -qiE '"severity"\s*:\s*"(CRITICAL|HIGH|MEDIUM)"' "$CI_PROJECT_DIR/Artifact_Desarrollo_Seguro.json"; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
      fi

  artifacts:
    when: always
    paths:
      - Artifact_Desarrollo_Seguro.json

secret_detection:

  stage: secrets

  artifacts:
    name: "Artifact_Desarrollo_Seguro"
    paths:
      - gl-secret-detection-report.json
    reports:
      secret_detection: Artifact_Desarrollo_Seguro.json

 # Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades.
  allow_failure: true

sca_vulnerability_check:
  stage: sca
  image: alpine:latest
  dependencies:
    - dependency_scanning
  script:
    - |
      if [ -f gl-dependency-scanning-report.json ]; then
        cp gl-dependency-scanning-report.json Artifact_Desarrollo_Seguro.json
      else
        echo '{"tool":"DependencyScanning","status":"no_report"}' > Artifact_Desarrollo_Seguro.json
      fi

    - |
      if grep -qiE '"severity"\s*:\s*"(critical|high|medium)"' Artifact_Desarrollo_Seguro.json; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
      fi
#  Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades.
  allow_failure: true

sast:
  stage: sast

  after_script:
    - echo "Procesando resultados del análisis SAST..."

    - |
      if [ -f gl-sast-report.json ]; then
        cp gl-sast-report.json Artifact_Desarrollo_Seguro.json
      else
        echo "{}" > Artifact_Desarrollo_Seguro.json
      fi

    - |
      if grep -qiE '"severity"\s*:\s*"(critical|high|medium)"' Artifact_Desarrollo_Seguro.json; then
        echo "¡Se han encontrado vulnerabilidades críticas, altas o medias!"
        exit 1
      else
        echo "✅ No hay ninguna vulnerabilidad"
      fi

  artifacts:
    when: always
    paths:
      - Artifact_Desarrollo_Seguro.json

  # Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades
  # allow_failure: true

snyk_sast:
  stage: snyk
  image: node:18
  variables:
    SNYK_TOKEN: $SNYK_TOKEN  # GitLab CI variable protegida
  before_script:
    - npm install -g snyk
    - npm install
    # 1. Verificar que el token no está vacío
    - |
      if [ -z "$SNYK_TOKEN" ]; then
        echo "❌ ERROR: La variable SNYK_TOKEN no está definida o está vacía."
        echo '{"ok":false,"error":"SNYK_TOKEN no definida"}' > Artifact_Desarrollo_Seguro.json
        exit 1
      else
        echo "✅ SNYK_TOKEN tiene longitud: ${#SNYK_TOKEN}"
      fi
    # 2. Configurar el token explícitamente
    - snyk config set api="$SNYK_TOKEN"
    # 3. Verificar autenticación con whoami
    - |
      if snyk whoami > /dev/null 2>&1; then
        echo "✅ Autenticación correcta. Usuario: $(snyk whoami)"
      else
        echo "❌ Error de autenticación. El token no es válido o no tiene permisos."
        echo '{"ok":false,"error":"Token inválido o sin permisos"}' > Artifact_Desarrollo_Seguro.json
        exit 1
      fi
  script:
    # 4. Ejecutar el análisis y generar JSON
    - snyk test --severity-threshold=medium --json > Artifact_Desarrollo_Seguro.json
    - snyk_exit_code=$?
    # 5. Mostrar las primeras líneas del JSON (útil para logs)
    - head -20 Artifact_Desarrollo_Seguro.json
    # 6. Evaluar el código de salida
    - |
      if [ $snyk_exit_code -eq 0 ]; then
        echo "✅ No se encontraron vulnerabilidades críticas, altas o medias."
      elif [ $snyk_exit_code -eq 1 ]; then
        echo "❌ Se encontraron vulnerabilidades críticas, altas o medias. Revisa el artifact."
        exit 1   # Cambia a 0 si no quieres que falle el pipeline (junto con allow_failure)
      else
        echo "⚠️ Error en la ejecución de Snyk (código $snyk_exit_code)."
        exit $snyk_exit_code
      fi
  artifacts:
    paths:
      - Artifact_Desarrollo_Seguro.json
    when: always
  # Quitar el hashtag para probar todo el pipeline aunque existan vulnerabilidades.
  allow_failure: true